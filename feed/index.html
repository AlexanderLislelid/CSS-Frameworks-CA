<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="../assets/favicon_io/favicon.ico"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/favicon_io/favicon-16x16.png"
    />
    <script
      src="https://kit.fontawesome.com/534136dc01.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="background flex min-h-screen flex-col text-white">
    <nav
      class="mx-auto my-6 hidden items-center rounded-full bg-slate-900 px-2 py-2 shadow-lg sm:flex"
    >
      <div class="relative">
        <i
          class="fa-solid fa-magnifying-glass absolute top-2 left-3 text-sm text-gray-400"
        ></i>
        <input
          type="search"
          class="rounded-full border border-white/10 py-1 pl-8 text-sm placeholder-gray-400/60 transition outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
          placeholder="search.."
        />
      </div>

      <ul class="mx-6 flex gap-4">
        <li>
          <a href="../feed/index.html" class="active">Feed</a>
        </li>
        <li>
          <a
            href="../profile/index.html"
            class="transition hover:scale-105 hover:text-indigo-400"
            >Profile</a
          >
        </li>
        <li>
          <a href="#" class="transition hover:scale-105 hover:text-indigo-400"
            >Post</a
          >
        </li>
      </ul>

      <a
        href="../index.html"
        class="flex size-8 items-center justify-center rounded-full bg-gray-300 text-black transition hover:bg-indigo-500 hover:text-white"
      >
        <i class="fa-solid fa-arrow-right-from-bracket text-sm"></i>
      </a>
    </nav>
    <nav
      class="fixed right-0 bottom-0 left-0 flex items-center justify-around border-t border-white/10 bg-slate-900 px-4 py-3 sm:hidden"
    >
      <a
        href="../feed/index.html"
        class="flex flex-col items-center gap-1 text-indigo-400"
      >
        <i class="fa-solid fa-house text-lg"></i>
        <span class="text-xs">Feed</span>
      </a>
      <a
        href="../profile/index.html"
        class="flex flex-col items-center gap-1 text-gray-300 transition hover:text-indigo-400"
      >
        <i class="fa-solid fa-user text-lg"></i>
        <span class="text-xs">Profile</span>
      </a>
      <a
        href="#"
        class="flex flex-col items-center gap-1 text-gray-300 transition hover:text-indigo-400"
      >
        <i class="fa-solid fa-plus text-lg"></i>
        <span class="text-xs">Post</span>
      </a>
      <a
        href="../index.html"
        class="flex flex-col items-center gap-1 text-gray-300 transition hover:text-indigo-400"
      >
        <i class="fa-solid fa-arrow-right-from-bracket text-lg"></i>
        <span class="text-xs">Logout</span>
      </a>
    </nav>
    <main class="flex-1"></main>
    <footer class="hidden border-t border-white/10 bg-slate-900 sm:block">
      <div class="mx-auto max-w-4xl px-6 py-8">
        <div
          class="flex flex-col items-center gap-6 sm:flex-row sm:justify-between"
        >
          <ul class="flex gap-6 text-sm text-gray-400">
            <li>
              <button
                class="cursor-pointer transition hover:text-indigo-400"
                popovertarget="popover-not-available"
              >
                About
              </button>
            </li>
            <li>
              <button
                class="cursor-pointer transition hover:text-indigo-400"
                popovertarget="popover-not-available"
              >
                Contact
              </button>
            </li>
            <li>
              <button
                class="transition hover:text-indigo-400"
                popovertarget="popover-not-available"
              >
                Privacy
              </button>
            </li>
          </ul>

          <div class="flex gap-4 text-gray-400">
            <a
              href="https://www.instagram.com/"
              class="transition hover:text-indigo-400"
              ><i class="fa-brands fa-instagram"></i
            ></a>
            <a href="https://x.com/" class="transition hover:text-indigo-400"
              ><i class="fa-brands fa-x-twitter"></i
            ></a>
            <a
              href="https://www.tiktok.com/"
              class="transition hover:text-indigo-400"
              ><i class="fa-brands fa-tiktok"></i
            ></a>
          </div>

          <p class="text-xs text-gray-500">© 2025 Yap. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </body>
</html>
